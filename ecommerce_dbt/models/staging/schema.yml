version: 2

models:
  - name: stg_customers
    columns:
      - name: customer_id
        data_tests:
          - unique
          - not_null

  - name: stg_orders
    columns:
      - name: order_id
        data_tests:
          - unique
          - not_null
      - name: customer_id
        data_tests:
          - not_null
      - name: status
        data_tests:
          - accepted_values:
              values:
                - completed
                - pending
                - cancelled
                - refunded

  - name: stg_products
    columns:
      - name: product_id
        data_tests:
          - unique
          - not_null

  - name: stg_order_items
    columns:
      - name: order_item_id
        data_tests:
          - unique
          - not_null
      - name: order_id
        data_tests:
          - not_null
      - name: product_id
        data_tests:
          - not_null

  - name: stg_categories
    columns:
      - name: category_id
        data_tests:
          - unique
          - not_null