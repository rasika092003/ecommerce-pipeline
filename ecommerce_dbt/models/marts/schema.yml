version: 2

models:
  - name: dim_customers
    columns:
      - name: customer_id
        data_tests:
          - unique
          - not_null
      - name: customer_segment
        data_tests:
          - accepted_values:
              values:
                - VIP
                - High Value
                - Mid Value
                - Low Value

  - name: dim_products
    columns:
      - name: product_id
        data_tests:
          - unique
          - not_null
      - name: stock_status
        data_tests:
          - accepted_values:
              values:
                - In Stock
                - Low Stock
                - Critical
                - Out of Stock

  - name: fct_orders
    columns:
      - name: order_id
        data_tests:
          - unique
          - not_null
      - name: customer_id
        data_tests:
          - not_null
      - name: revenue
        data_tests:
          - not_null

  - name: dim_date
    columns:
      - name: date_day
        data_tests:
          - unique
          - not_null